<script>
  // Render mínimo del grid filtrado por categoría (sin depender del UI de catalogo.html)
  (function renderCategoryGrid() {
    var cat = window.PM7_CATEGORY || "todos";
    var list = (typeof getProductsByCategory === "function") ? getProductsByCategory(cat) : [];
    var grid = document.getElementById("products-grid");
    if (!grid || !list.length) return;

    grid.innerHTML = list.map(function (p) {
      var price = (typeof formatPrice === "function") ? formatPrice(p.price) : ("$" + p.price);
      return '' +
        '<article class="product-card" data-id="' + p.id + '">' +
          '<div class="product-image"><img src="' + p.image + '" alt="' + p.name + '" loading="lazy" decoding="async"></div>' +
          '<div class="product-info">' +
            '<h3>' + p.name + '</h3>' +
            '<p class="product-desc">' + (p.description || "") + '</p>' +
            '<div class="product-footer">' +
              '<span class="product-price">' + price + '</span>' +
              '<button class="btn btn-gold add-to-cart" data-id="' + p.id + '">Agregar</button>' +
            '</div>' +
          '</div>' +
        '</article>';
    }).join("");

    // Re-enganchar add-to-cart si la función global existe
    document.querySelectorAll(".add-to-cart").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = parseInt(this.dataset.id, 10);
        if (typeof window.addToCart === "function") window.addToCart(id);
      });
    });
  })();
</script>
