<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a130d"/>
      <stop offset="50%" stop-color="#0f1a14"/>
      <stop offset="100%" stop-color="#1a2a1f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#d4a24c" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#d4a24c" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d4a24c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f3c97a"/>
      <stop offset="100%" stop-color="#a87727"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- bg -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="980" cy="320" rx="520" ry="380" fill="url(#glow)"/>

  <!-- mate icon decorativo a la derecha -->
  <g transform="translate(880, 200)" opacity="0.5">
    <ellipse cx="120" cy="180" rx="140" ry="38" fill="rgba(0,0,0,0.4)"/>
    <path d="M 60 60 Q 60 220 120 240 Q 180 220 180 60 Z" fill="url(#gold)" opacity="0.9"/>
    <path d="M 60 60 Q 60 220 120 240 Q 180 220 180 60" fill="none" stroke="#f3c97a" stroke-width="3"/>
    <rect x="115" y="20" width="10" height="100" fill="#cfd5d8" rx="2"/>
    <circle cx="120" cy="60" r="22" fill="#cfd5d8" stroke="#8b8e8f" stroke-width="2"/>
  </g>

  <!-- chip -->
  <g transform="translate(80, 100)">
    <rect width="220" height="44" rx="22" fill="rgba(212,162,76,0.12)" stroke="#d4a24c" stroke-opacity="0.4"/>
    <circle cx="22" cy="22" r="4" fill="#d4a24c"/>
    <text x="40" y="29" fill="#d4a24c" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="3">🧉 ARTESANÍA PREMIUM</text>
  </g>

  <!-- title -->
  <text x="80" y="240" fill="#f5efe6" font-family="Georgia, serif" font-size="96" font-weight="700" letter-spacing="-2">
    Pasión Matera 7
  </text>

  <!-- subtitle -->
  <text x="80" y="310" fill="#f5efe6" font-family="Georgia, serif" font-size="56" font-style="italic" opacity="0.85">
    El mate que te representa.
  </text>

  <!-- description -->
  <text x="80" y="380" fill="#f5efe6" font-family="Inter, system-ui, sans-serif" font-size="26" opacity="0.7">
    <tspan x="80" dy="0">Mates artesanales, termos, bombillas,</tspan>
    <tspan x="80" dy="38">asado y grabados personalizados.</tspan>
  </text>

  <!-- footer bar -->
  <line x1="80" y1="500" x2="700" y2="500" stroke="#d4a24c" stroke-width="2" opacity="0.6"/>
  <text x="80" y="540" fill="#d4a24c" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">
    pasionmatera7.com
  </text>
  <text x="80" y="572" fill="#f5efe6" font-family="Inter, system-ui, sans-serif" font-size="18" opacity="0.6">
    Envíos a todo el país · WhatsApp +54 9 11 7900-6737
  </text>
</svg>
